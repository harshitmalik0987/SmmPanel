<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>My SocialPanel 🚀 - #1 SMM Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#000000;--bg2:#05050a;--bg3:#0a0a14;
  --purple:#8B5CF6;--purple-d:#6D28D9;--purple-l:#A78BFA;
  --cyan:#06B6D4;--cyan-d:#0891B2;--cyan-l:#67E8F9;
  --text:#E2E8F0;--muted:#94A3B8;--border:rgba(139,92,246,0.25);
  --card:rgba(8,8,16,0.85);--success:#10B981;--error:#EF4444;--warn:#F59E0B;
  --glow-p:0 0 20px rgba(139,92,246,0.4);--glow-c:0 0 20px rgba(6,182,212,0.4);
}
html,body{height:100%;font-family:'Exo 2',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;cursor:none;}
a{color:var(--cyan-l);text-decoration:none;}
button{cursor:none;font-family:'Exo 2',sans-serif;}
input,select,textarea{font-family:'Exo 2',sans-serif;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:#0a0a14;}
::-webkit-scrollbar-thumb{background:var(--purple);border-radius:2px;}

/* CURSOR */
#cursor{position:fixed;width:20px;height:20px;background:var(--cyan);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:width .15s,height .15s,background .15s;mix-blend-mode:screen;box-shadow:0 0 15px var(--cyan),0 0 30px rgba(6,182,212,0.5);}
#cursorRing{position:fixed;width:40px;height:40px;border:1.5px solid var(--purple-l);border-radius:50%;pointer-events:none;z-index:99998;transform:translate(-50%,-50%);transition:transform .1s;opacity:.7;}
body.clicking #cursor{width:12px;height:12px;background:var(--purple-l);}

/* CANVAS */
#particleCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}

/* ORBS */
#orbs{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.15;}
.orb1{width:500px;height:500px;background:radial-gradient(circle,var(--purple),transparent);top:-100px;left:-100px;animation:drift1 18s ease-in-out infinite;}
.orb2{width:400px;height:400px;background:radial-gradient(circle,var(--cyan),transparent);bottom:-80px;right:-80px;animation:drift2 22s ease-in-out infinite;}
.orb3{width:350px;height:350px;background:radial-gradient(circle,#EC4899,transparent);top:40%;left:60%;animation:drift3 26s ease-in-out infinite;}
@keyframes drift1{0%,100%{transform:translate(0,0);}33%{transform:translate(80px,60px);}66%{transform:translate(-40px,100px);}}
@keyframes drift2{0%,100%{transform:translate(0,0);}33%{transform:translate(-70px,-50px);}66%{transform:translate(40px,-90px);}}
@keyframes drift3{0%,100%{transform:translate(0,0);}50%{transform:translate(-120px,60px);}}

/* GRAIN */
#grain{position:fixed;inset:0;z-index:2;pointer-events:none;opacity:.035;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px 200px;}

/* MAIN LAYOUT */
#app{position:relative;z-index:10;min-height:100vh;}
.page{display:none;min-height:100vh;}
.page.active{display:block;}

/* NAV */
#navbar{position:fixed;top:0;left:0;right:0;z-index:100;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,0.7);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
.nav-logo{font-family:'Orbitron',monospace;font-size:clamp(14px,3.5vw,20px);font-weight:900;background:linear-gradient(135deg,var(--purple-l),var(--cyan-l));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;}
.nav-links{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.nav-btn{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:13px;font-weight:500;transition:.2s;}
.nav-btn:hover{background:rgba(139,92,246,0.15);border-color:var(--purple);}
.nav-btn.primary{background:linear-gradient(135deg,var(--purple-d),var(--cyan-d));border-color:transparent;color:#fff;}
.nav-btn.primary:hover{opacity:.9;box-shadow:var(--glow-p);}
.nav-user{display:flex;align-items:center;gap:8px;}
.user-bal{background:rgba(6,182,212,0.1);border:1px solid rgba(6,182,212,0.3);padding:5px 10px;border-radius:20px;font-size:12px;color:var(--cyan-l);font-weight:600;}
.hamburger{display:none;flex-direction:column;gap:4px;background:none;border:none;padding:4px;}
.hamburger span{width:22px;height:2px;background:var(--text);border-radius:2px;display:block;transition:.3s;}
@media(max-width:640px){.hamburger{display:flex;}.nav-desktop{display:none;}.nav-links{display:none;}.nav-mobile-menu{position:fixed;top:56px;left:0;right:0;background:rgba(5,5,15,0.98);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:16px;display:flex;flex-direction:column;gap:8px;z-index:99;transform:translateY(-110%);transition:transform .3s;}.nav-mobile-menu.open{transform:translateY(0);}.nav-mobile-menu .nav-btn{width:100%;text-align:left;padding:12px 16px;font-size:15px;}}

/* HERO / LANDING */
.hero{padding:120px 20px 80px;text-align:center;max-width:900px;margin:0 auto;}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.3);padding:6px 16px;border-radius:20px;font-size:12px;color:var(--purple-l);margin-bottom:24px;animation:fadeDown .6s ease;}
.hero h1{font-family:'Orbitron',monospace;font-size:clamp(28px,7vw,72px);font-weight:900;line-height:1.1;margin-bottom:20px;animation:fadeDown .7s ease;}
.hero h1 .grad{background:linear-gradient(135deg,var(--purple-l),var(--cyan-l));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero p{font-size:clamp(14px,3vw,18px);color:var(--muted);max-width:600px;margin:0 auto 36px;line-height:1.7;animation:fadeDown .8s ease;}
.hero-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;animation:fadeDown .9s ease;}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:600;border:none;transition:.2s;white-space:nowrap;}
.btn-primary{background:linear-gradient(135deg,var(--purple-d),var(--cyan-d));color:#fff;box-shadow:0 4px 20px rgba(139,92,246,0.3);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(139,92,246,0.5);}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border);}
.btn-outline:hover{border-color:var(--cyan);color:var(--cyan-l);box-shadow:var(--glow-c);}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;max-width:900px;margin:0 auto 60px;padding:0 20px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;text-align:center;backdrop-filter:blur(10px);transition:.3s;}
.stat-card:hover{border-color:var(--purple);box-shadow:var(--glow-p);transform:translateY(-4px);}
.stat-num{font-family:'Orbitron',monospace;font-size:clamp(20px,4vw,32px);font-weight:700;background:linear-gradient(135deg,var(--purple-l),var(--cyan-l));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.stat-label{color:var(--muted);font-size:12px;margin-top:4px;}

/* FEATURES */
.features{max-width:900px;margin:0 auto 60px;padding:0 20px;}
.section-title{font-family:'Orbitron',monospace;font-size:clamp(18px,4vw,28px);font-weight:700;text-align:center;margin-bottom:32px;background:linear-gradient(135deg,var(--purple-l),var(--cyan-l));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.features-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;}
.feature-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;backdrop-filter:blur(10px);transition:.3s;}
.feature-card:hover{border-color:var(--cyan);box-shadow:var(--glow-c);transform:translateY(-3px);}
.feature-icon{font-size:28px;margin-bottom:12px;}
.feature-card h3{font-size:15px;font-weight:600;margin-bottom:6px;}
.feature-card p{font-size:13px;color:var(--muted);line-height:1.6;}

/* AUTH PAGES */
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:80px 16px 40px;}
.auth-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:clamp(24px,5vw,40px);width:100%;max-width:420px;backdrop-filter:blur(20px);box-shadow:0 20px 60px rgba(0,0,0,0.5);}
.auth-box h2{font-family:'Orbitron',monospace;font-size:clamp(18px,4vw,24px);font-weight:700;margin-bottom:6px;background:linear-gradient(135deg,var(--purple-l),var(--cyan-l));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.auth-box .sub{color:var(--muted);font-size:13px;margin-bottom:28px;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.form-group label span{color:var(--purple-l);}
.form-input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:14px;transition:.2s;outline:none;}
.form-input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(139,92,246,0.15);}
.form-input.error-field{border-color:var(--error);}
.form-input.success-field{border-color:var(--success);}
.field-error{font-size:11px;color:var(--error);margin-top:4px;display:flex;align-items:center;gap:4px;}
.field-success{font-size:11px;color:var(--success);margin-top:4px;}
.pw-strength{height:3px;border-radius:2px;background:#1a1a2e;margin-top:6px;overflow:hidden;}
.pw-bar{height:100%;border-radius:2px;transition:width .3s,background .3s;}
.pw-hint{font-size:11px;color:var(--muted);margin-top:4px;}
.btn-full{width:100%;justify-content:center;padding:14px;font-size:15px;border-radius:10px;}
.auth-switch{text-align:center;margin-top:20px;font-size:13px;color:var(--muted);}
.auth-switch a{color:var(--purple-l);font-weight:600;}

/* DASHBOARD LAYOUT */
.dash-layout{display:flex;min-height:100vh;padding-top:60px;}
.sidebar{width:240px;background:rgba(5,5,12,0.9);border-right:1px solid var(--border);padding:20px 0;position:fixed;top:60px;left:0;bottom:0;overflow-y:auto;z-index:50;backdrop-filter:blur(10px);}
.sidebar-user{padding:16px 20px;border-bottom:1px solid var(--border);margin-bottom:8px;}
.sidebar-avatar{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--purple-d),var(--cyan-d));display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:8px;}
.sidebar-name{font-weight:600;font-size:14px;}
.sidebar-bal{font-size:12px;color:var(--cyan-l);font-weight:600;}
.sidebar-nav{padding:0 10px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;color:var(--muted);font-size:13px;font-weight:500;cursor:none;transition:.2s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;}
.nav-item:hover{background:rgba(139,92,246,0.1);color:var(--text);}
.nav-item.active{background:rgba(139,92,246,0.2);color:var(--purple-l);border-left:2px solid var(--purple);}
.nav-item i{width:16px;text-align:center;}
.dash-content{flex:1;margin-left:240px;padding:24px;min-height:calc(100vh - 60px);}
@media(max-width:768px){.sidebar{transform:translateX(-100%);transition:.3s;}.sidebar.open{transform:translateX(0);}.dash-content{margin-left:0;padding:16px;}.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:49;}.sidebar-overlay.active{display:block;}}

/* BOTTOM NAV (mobile) */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:80;background:rgba(5,5,15,0.95);border-top:1px solid var(--border);backdrop-filter:blur(20px);padding:8px 0 env(safe-area-inset-bottom,0);}
@media(max-width:768px){.bottom-nav{display:flex;}.dash-content{padding-bottom:80px;}}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px;color:var(--muted);font-size:10px;font-weight:500;border:none;background:none;cursor:none;transition:.2s;}
.bn-item.active{color:var(--purple-l);}
.bn-item i{font-size:18px;}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;backdrop-filter:blur(10px);}
.card-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.card-val{font-family:'Orbitron',monospace;font-size:clamp(18px,3vw,26px);font-weight:700;}
.card-val.purple{color:var(--purple-l);}
.card-val.cyan{color:var(--cyan-l);}
.card-val.green{color:var(--success);}
.card-val.yellow{color:var(--warn);}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:24px;}

/* TABLE */
.table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:rgba(139,92,246,0.1);padding:12px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}
td{padding:12px 14px;border-top:1px solid var(--border);vertical-align:middle;}
tr:hover td{background:rgba(139,92,246,0.05);}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
.badge.pending{background:rgba(245,158,11,0.15);color:var(--warn);border:1px solid rgba(245,158,11,0.3);}
.badge.processing{background:rgba(6,182,212,0.15);color:var(--cyan-l);border:1px solid rgba(6,182,212,0.3);}
.badge.completed{background:rgba(16,185,129,0.15);color:var(--success);border:1px solid rgba(16,185,129,0.3);}
.badge.cancelled{background:rgba(239,68,68,0.15);color:var(--error);border:1px solid rgba(239,68,68,0.3);}
.badge.active{background:rgba(16,185,129,0.15);color:var(--success);border:1px solid rgba(16,185,129,0.3);}
.badge.partial{background:rgba(139,92,246,0.15);color:var(--purple-l);border:1px solid rgba(139,92,246,0.3);}

/* FORM ELEMENTS */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:480px){.form-row{grid-template-columns:1fr;}}
.input-icon{position:relative;}
.input-icon i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;}
.input-icon .form-input{padding-left:36px;}
.select-input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:14px;outline:none;appearance:none;cursor:none;}
.select-input:focus{border-color:var(--purple);}
.select-input option{background:#0a0a14;color:var(--text);}

/* SERVICE CARDS */
.services-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.service-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;transition:.3s;cursor:none;}
.service-card:hover{border-color:var(--purple);transform:translateY(-2px);box-shadow:var(--glow-p);}
.sc-platform{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.sc-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.sc-cat{font-size:11px;color:var(--muted);font-weight:500;}
.sc-name{font-size:14px;font-weight:600;margin-bottom:8px;line-height:1.4;}
.sc-meta{display:flex;justify-content:space-between;align-items:center;margin-top:12px;}
.sc-price{font-family:'Orbitron',monospace;font-size:13px;color:var(--cyan-l);font-weight:700;}
.sc-range{font-size:11px;color:var(--muted);}
.btn-sm{padding:7px 14px;font-size:12px;border-radius:8px;border:none;font-weight:600;transition:.2s;}
.btn-purple{background:linear-gradient(135deg,var(--purple-d),var(--purple));color:#fff;}
.btn-cyan{background:linear-gradient(135deg,var(--cyan-d),var(--cyan));color:#fff;}
.btn-green{background:linear-gradient(135deg,#059669,#10B981);color:#fff;}
.btn-red{background:linear-gradient(135deg,#DC2626,#EF4444);color:#fff;}
.btn-yellow{background:linear-gradient(135deg,#D97706,#F59E0B);color:#fff;}
.btn-ghost{background:rgba(255,255,255,0.06);color:var(--text);border:1px solid var(--border);}
.btn-sm:hover{opacity:.85;transform:scale(.97);}

/* CATEGORY TABS */
.cat-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:20px;scrollbar-width:none;}
.cat-tabs::-webkit-scrollbar{display:none;}
.cat-tab{padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:500;white-space:nowrap;cursor:none;transition:.2s;}
.cat-tab.active{background:rgba(139,92,246,0.2);border-color:var(--purple);color:var(--purple-l);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(6px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.show{display:flex;}
.modal-box{background:#08080f;border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.8);}
.modal-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.08);border:none;color:var(--text);width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:none;}
.modal-title{font-family:'Orbitron',monospace;font-size:16px;font-weight:700;margin-bottom:20px;color:var(--purple-l);}

/* TOAST */
#toastContainer{position:fixed;top:80px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;max-width:320px;}
.toast{background:#0d0d1a;border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-size:13px;backdrop-filter:blur(20px);animation:toastIn .3s ease;display:flex;align-items:center;gap:10px;box-shadow:0 8px 30px rgba(0,0,0,0.5);}
.toast.success{border-color:var(--success);}
.toast.error{border-color:var(--error);}
.toast.info{border-color:var(--cyan);}
@keyframes toastIn{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes toastOut{from{transform:translateX(0);opacity:1;}to{transform:translateX(110%);opacity:0;}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}

/* ADMIN STYLES */
.admin-layout{display:flex;min-height:100vh;}
.admin-sidebar{width:250px;background:#03030a;border-right:1px solid var(--border);padding:20px 0;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:50;}
.admin-logo{padding:20px 20px 16px;border-bottom:1px solid var(--border);margin-bottom:12px;}
.admin-logo span{font-family:'Orbitron',monospace;font-size:15px;font-weight:800;background:linear-gradient(135deg,var(--purple-l),var(--cyan-l));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.admin-logo small{display:block;font-size:10px;color:var(--muted);margin-top:2px;}
.admin-content{flex:1;margin-left:250px;padding:24px;background:var(--bg2);}
@media(max-width:768px){.admin-sidebar{transform:translateX(-100%);transition:.3s;z-index:200;}.admin-sidebar.open{transform:translateX(0);}.admin-content{margin-left:0;padding:16px;}}
.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
.admin-title{font-family:'Orbitron',monospace;font-size:clamp(16px,3vw,22px);font-weight:700;color:var(--purple-l);}
.admin-login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px;}

/* DEPOSIT */

// ============================================================
// PARTICLE CANVAS
// ============================================================
(function(){
  const canvas=document.getElementById('particleCanvas');
  const ctx=canvas.getContext('2d');
  let W,H,particles=[];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  const N=Math.min(70,Math.floor(window.innerWidth/15));
  for(let i=0;i<N;i++)particles.push({
    x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,
    vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,
    r:Math.random()*2+.5,
    c:Math.random()>.5?'rgba(139,92,246,':'rgba(6,182,212,'
  });
  function draw(){
    ctx.clearRect(0,0,W,H);
    for(let i=0;i<particles.length;i++){
      const p=particles[i];
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>W)p.vx*=-1;
      if(p.y<0||p.y>H)p.vy*=-1;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.c+'0.7)';ctx.fill();
      for(let j=i+1;j<particles.length;j++){
        const q=particles[j];
        const d=Math.hypot(p.x-q.x,p.y-q.y);
        if(d<120){
          ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);
          const a=1-d/120;
          ctx.strokeStyle=`rgba(139,92,246,${a*.25})`;ctx.lineWidth=.5;ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

function validateEmail(e){return/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);}
function validatePassword(p){
  return{
    len:p.length>=8,
    upper:/[A-Z]/.test(p),
    lower:/[a-z]/.test(p),
    num:/[0-9].*[0-9]/.test(p),
    special:/[@#$!%^&*()_+\-=\[\]{}|;:,.<>?]/.test(p)
  };
}
function pwScore(p){const v=validatePassword(p);return Object.values(v).filter(Boolean).length;}

function login(ue,pw){
  const users=DB.getUsers();
  const user=users.find(u=>(u.username===ue||u.email===ue)&&u.password===pw);
  if(!user)return{ok:false,msg:'❌ Invalid username/email or password'};
  if(user.blocked)return{ok:false,msg:'🚫 Your account has been suspended. Contact support.'};
  DB.saveSession({userId:user.id,username:user.username,email:user.email});
  return{ok:true,user};
}
function signup(username,email,pw){
  if(!username||username.length<3)return{ok:false,msg:'Username must be at least 3 characters'};
  if(!/^[a-zA-Z0-9_]+$/.test(username))return{ok:false,msg:'Username can only have letters, numbers, underscore'};
  if(!validateEmail(email))return{ok:false,msg:'Please enter a valid email address'};
  const v=validatePassword(pw);
  if(!v.len)return{ok:false,msg:'Password must be at least 8 characters'};
  if(!v.upper)return{ok:false,msg:'Password must contain at least 1 uppercase letter'};
  if(!v.lower)return{ok:false,msg:'Password must contain at least 1 lowercase letter'};
  if(!v.num)return{ok:false,msg:'Password must contain at least 2 numbers'};
  if(!v.special)return{ok:false,msg:'Password must contain at least 1 special character (@#$!%&*)'};
  const users=DB.getUsers();
  if(users.find(u=>u.username===username))return{ok:false,msg:'Username already taken'};
  if(users.find(u=>u.email===email))return{ok:false,msg:'Email already registered'};
  const user={id:uid(),username,email,password:pw,balance:0,joinDate:Date.now(),blocked:false,totalOrders:0,totalSpent:0};
  users.push(user);DB.saveUsers(users);
  DB.saveSession({userId:user.id,username:user.username,email:user.email});
  return{ok:true,user};
}
function logout(){DB.clearSession();go('home');}
function getUser(){
  const sess=DB.getSession();if(!sess)return null;
  return DB.getUsers().find(u=>u.id===sess.userId)||null;
}

function toggleEye(id,iconId){

  inp.style.paddingRight='36px';
}

  const ue=document.getElementById('loginUE').value.trim();
  const pw=document.getElementById('loginPW').value;

  btn.innerHTML='<span class="spinner"></span> Signing in...';btn.disabled=true;

function renderSignup(){
  document.getElementById('app').innerHTML=`

}
function checkUsername(el){
  const v=el.value.trim();const msg=document.getElementById('suNameMsg');
  if(!v){msg.innerHTML='';el.className='form-input';return;}
  if(v.length<3){msg.innerHTML='<div class="field-error">⚠️ At least 3 characters</div>';el.className='form-input error-field';return;}
  if(!/^[a-zA-Z0-9_]+$/.test(v)){msg.innerHTML='<div class="field-error">⚠️ Only letters, numbers, underscore</div>';el.className='form-input error-field';return;}
  const users=DB.getUsers();
  if(users.find(u=>u.username===v)){msg.innerHTML='<div class="field-error">❌ Username already taken</div>';el.className='form-input error-field';}
  else{msg.innerHTML='<div class="field-success">✅ Username available</div>';el.className='form-input success-field';}
}
function checkEmail(el){
  const v=el.value.trim();const msg=document.getElementById('suEmailMsg');
  if(!v){msg.innerHTML='';el.className='form-input';return;}
  if(!validateEmail(v)){msg.innerHTML='<div class="field-error">❌ Enter a valid email (e.g. user@gmail.com)</div>';el.className='form-input error-field';}
  else{msg.innerHTML='<div class="field-success">✅ Valid email</div>';el.className='form-input success-field';}
}
function checkPW(el){
  const p=el.value;const score=pwScore(p);
  const bar=document.getElementById('pwBar');const hint=document.getElementById('pwHint');
  const w=[0,20,40,65,85,100][score];
  const cols=['','#EF4444','#F59E0B','#EAB308','#22C55E','#10B981'][score];
  const labels=['','Very Weak 😱','Weak 😟','Fair 🤔','Strong 💪','Very Strong 🔥'][score]||'';
  bar.style.width=w+'%';bar.style.background=cols;hint.textContent=p.length?`${labels} — Must have: 8+ chars, uppercase, lowercase, 2 numbers, special char (@#$!)`:'Password strength indicator';
  hint.style.color=score>=3?'var(--success)':score>=2?'var(--warn)':'var(--error)';
}
function doSignup(){
  const name=document.getElementById('suName').value.trim();
  const email=document.getElementById('suEmail').value.trim();
  const pw=document.getElementById('suPW').value;
  const errEl=document.getElementById('signupErr');
  const btn=document.getElementById('signupBtn');
  errEl.style.display='none';
  btn.innerHTML='<span class="spinner"></span> Creating...';btn.disabled=true;
  setTimeout(()=>{
    const r=signup(name,email,pw);
    if(r.ok){toast('Account created! Welcome 🎉','success');go('dashboard');}
    else{errEl.style.display='flex';errEl.innerHTML=`⚠️ ${r.msg}`;btn.innerHTML='🎯 Create Account';btn.disabled=false;}
  },900);
}

function updateOrderPreview(){
  const sid=document.getElementById('orderSvc').value;
  const qty=parseInt(document.getElementById('orderQty').value)||1000;
  document.getElementById('qtyDisplay').textContent=qty.toLocaleString();
  document.getElementById('qtyInput').value=qty;
  if(!sid){document.getElementById('pricePreview').style.display='none';document.getElementById('serviceInfo').style.display='none';return;}
  const svc=DB.getServices().find(s=>s.id===sid);if(!svc)return;
  const range=document.getElementById('orderQty');
  range.min=svc.min;range.max=Math.min(svc.max,100000);
  document.getElementById('minLbl').textContent=`Min: ${svc.min.toLocaleString()}`;
  document.getElementById('maxLbl').textContent=`Max: ${svc.max.toLocaleString()}`;
  document.getElementById('serviceInfo').style.display='block';
  document.getElementById('serviceInfo').innerHTML=`
    <div class="si-row"><span>📦 Category</span><span>${svc.category}</span></div>
    <div class="si-row"><span>💰 Rate</span><span>₹${svc.price} per 1,000</span></div>
    <div class="si-row"><span>📊 Min/Max</span><span>${svc.min.toLocaleString()} – ${svc.max.toLocaleString()}</span></div>
    <div class="si-row"><span>ℹ️ Type</span><span>${svc.type}</span></div>`;
  const actualQty=Math.max(svc.min,Math.min(svc.max,qty));
  const total=(actualQty/1000)*svc.price;
  const user=getUser();
  document.getElementById('pricePreview').style.display='block';
  document.getElementById('rateDisplay').textContent=`₹${svc.price}/1000`;
  document.getElementById('qtyPreview').textContent=actualQty.toLocaleString();
  document.getElementById('totalDisplay').textContent=fmt(total);
  document.getElementById('balDisplay').textContent=fmt(user.balance);
  const warn=document.getElementById('balWarn');
  if(user.balance<total){warn.style.display='flex';warn.textContent=`⚠️ Insufficient balance. Need ${fmt(total-user.balance)} more.`;}
  else warn.style.display='none';
}
function changeQty(delta){
  const inp=document.getElementById('orderQty');
  inp.value=Math.max(parseInt(inp.min)||100,Math.min(parseInt(inp.max)||100000,parseInt(inp.value)+delta));
  updateOrderPreview();
}
function syncQtyInput(){
  const v=parseInt(document.getElementById('qtyInput').value)||1000;
  document.getElementById('orderQty').value=v;
  updateOrderPreview();
}
function placeOrder(){
  const sid=document.getElementById('orderSvc').value;
  const link=document.getElementById('orderLink').value.trim();
  const qty=parseInt(document.getElementById('orderQty').value)||1000;
  const errEl=document.getElementById('orderErr');
  const btn=document.getElementById('orderBtn');
  errEl.style.display='none';
  const linkErr=document.getElementById('linkErr');linkErr.style.display='none';
  if(!sid){errEl.style.display='flex';errEl.innerHTML='⚠️ Please select a service';return;}
  if(!link){linkErr.style.display='flex';linkErr.textContent='⚠️ Please enter the link/URL';return;}
  if(!link.startsWith('http')){linkErr.style.display='flex';linkErr.textContent='⚠️ Link must start with http:// or https://';return;}
  const svc=DB.getServices().find(s=>s.id===sid);
  if(!svc)return;
  const actualQty=Math.max(svc.min,Math.min(svc.max,qty));
  const charge=(actualQty/1000)*svc.price;
  const user=getUser();
  if(user.balance<charge){errEl.style.display='flex';errEl.innerHTML=`❌ Insufficient balance. Need ${fmt(charge)}. <a href="#" onclick="go('deposit')" style="margin-left:4px;color:var(--cyan-l)">Add Funds →</a>`;return;}
  btn.innerHTML='<span class="spinner"></span> Processing...';btn.disabled=true;
  setTimeout(()=>{
    const order={id:uid(),userId:user.id,serviceId:sid,link,quantity:actualQty,charge,status:'pending',date:Date.now(),startCount:0,remains:actualQty};

function renderOrdersTable(orders){

      const progress=o.status==='processing'?Math.floor(Math.random()*60+20):o.status==='completed'?100:0;
      return`<tr onclick="showOrderDetail('${o.id}')" style="cursor:none;">
        <td><span style="font-family:monospace;font-size:11px;color:var(--purple-l);">#${o.id.substr(0,8).toUpperCase()}</span></td>

      </tr>`;
    }).join('')}</tbody>
  </table></div>`;
}
function filterOrders(q){
  const orders=window._allOrders||[];
  const filtered=q?orders.filter(o=>o.id.toLowerCase().includes(q.toLowerCase())||o.link.toLowerCase().includes(q.toLowerCase())):orders;
  document.getElementById('ordersTable').innerHTML=renderOrdersTable(filtered);
}
function filterOrderStatus(s,btn){
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  const orders=window._allOrders||[];
  const filtered=s==='all'?orders:orders.filter(o=>o.status===s);
  document.getElementById('ordersTable').innerHTML=renderOrdersTable(filtered);
}
function showOrderDetail(id){
  const order=DB.getOrders().find(o=>o.id===id);if(!order)return;
  const svc=DB.getServices().find(s=>s.id===order.serviceId)||{name:'Deleted Service',category:'N/A'};

function submitDeposit(){
  const amt=parseFloat(document.getElementById('depAmt').value)||0;
  const txId=document.getElementById('depTxId').value.trim();
  const note=document.getElementById('depNote').value.trim();
  const s=DB.getSettings();
  const errEl=document.getElementById('depErr');
  const btn=document.getElementById('depBtn');
  errEl.style.display='none';
  if(amt<s.minDeposit||amt>s.maxDeposit){errEl.style.display='flex';errEl.innerHTML=`⚠️ Amount must be between ₹${s.minDeposit} and ₹${s.maxDeposit.toLocaleString()}`;return;}

  btn.innerHTML='<span class="spinner"></span> Submitting...';btn.disabled=true;
  setTimeout(()=>{

    const dep={id:uid(),userId:user.id,username:user.username,amount:amt,method:window._depMethod||'UPI',txId,note,status:'pending',date:Date.now()};

    toast('Deposit request submitted! 🎉 Admin will verify soon.','success');
    go('deposit');
  },1000);

  if(!v.len||!v.upper||!v.lower||!v.num||!v.special){errEl.style.display='flex';errEl.textContent='⚠️ New password too weak (8+ chars, upper, lower, 2 numbers, special)';return;}
  updateUser(user.id,{password:nw});

function saveProvider(editId){
  const name=document.getElementById('pf_name').value.trim();
  const url=document.getElementById('pf_url').value.trim();
  const key=document.getElementById('pf_key').value.trim();
  const markupType=document.getElementById('pf_markupType').value;

  const errEl=document.getElementById('pfErr');
  if(!name||!url||!key){errEl.style.display='flex';errEl.textContent='⚠️ All fields are required';return;}
  const providers=DB.getProviders();
  const prov={id:editId||uid(),name,apiUrl:url,apiKey:key,markupType,markup,status:'active',balance:'—',serviceCount:0};
  if(editId){const i=providers.findIndex(p=>p.id===editId);if(i>=0)providers[i]={...providers[i],...prov};}
  else providers.push(prov);
  DB.saveProviders(providers);closeModal();renderAdminProviders();
  toast(editId?'Provider updated! ✅':'Provider added! ✅','success');
}
function fetchProviderServices(id){
  const p=DB.getProviders().find(x=>x.id===id);if(!p)return;
  toast('Fetching services from '+p.name+'... 🔄','info');
  // Try to fetch real API — standard SMM panel API format
  const body=new URLSearchParams({key:p.apiKey,action:'services'});
  fetch(p.apiUrl,{method:'POST',body,headers:{'Content-Type':'application/x-www-form-urlencoded'}})
  .then(r=>r.json())
  .then(data=>{
    if(!Array.isArray(data)){toast('Invalid API response ❌ — Check API URL/key','error');return;}
    let imported=0;const services=DB.getServices();
    const markup=p.markupType==='percentage'?p.markup/100:0;
    const markupFixed=p.markupType==='fixed'?p.markup:0;
    data.forEach(item=>{
      const exists=services.find(s=>s.apiProvider===id&&s.apiServiceId===String(item.service));
      const price=parseFloat(item.rate)||1;
      const myPrice=p.markupType==='percentage'?price*(1+markup):price+markupFixed;
      const svc={
        id:exists?exists.id:uid(),
        category:item.category||'Other',
        name:item.name||`Service #${item.service}`,
        description:item.description||item.name||'',
        price:Math.round(myPrice*100)/100,
        min:parseInt(item.min)||100,
        max:parseInt(item.max)||100000,
        type:item.type||'Default',
        status:'active',
        apiProvider:id,
        apiServiceId:String(item.service),
      };
      if(exists){const i=services.findIndex(s=>s.id===exists.id);services[i]=svc;}
      else{services.push(svc);imported++;}
    });
    DB.saveServices(services);
    // Update provider serviceCount
    const providers=DB.getProviders();const pi=providers.findIndex(x=>x.id===id);
    if(pi>=0){providers[pi].serviceCount=data.length;}DB.saveProviders(providers);
    toast(`✅ Fetched ${data.length} services, ${imported} new added!`,'success');
    renderAdminProviders();
  })
  .catch(err=>{toast(`❌ API Error: ${err.message}. Check CORS / API URL.`,'error',5000);});
}
function deleteProvider(id){
  if(!confirm('Delete this provider? Linked services will remain.'))return;
  DB.saveProviders(DB.getProviders().filter(p=>p.id!==id));
  renderAdminProviders();toast('Provider deleted 🗑️','info');
}

    <div class="form-group"><label>🏦 Bank Name</label><input class="form-input" id="ss_bname" value="${s.bankName||''}" type="text"></div>
    <div class="form-group"><label>Account Number</label><input class="form-input" id="ss_bacc" value="${s.bankAcc||''}" type="text"></div>
    <div class="form-group"><label>IFSC Code</label><input class="form-input" id="ss_ifsc" value="${s.bankIFSC||''}" type="text"></div>
    <div class="form-group"><label>Account Holder Name</label><input class="form-input" id="ss_holder" value="${s.bankHolder||''}" type="text"></div>
  </div>
</div>
<div style="margin-top:16px;">
  <button class="btn btn-primary" onclick="saveSettings()">💾 Save All Settings</button>
</div>
<div class="card" style="margin-top:20px;">
  <div style="font-weight:600;font-size:14px;margin-bottom:12px;">🔧 Danger Zone</div>
  <div class="alert warn"><i class="fa fa-exclamation-triangle"></i> These actions are irreversible.</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;">
    <button class="btn-sm btn-red" onclick="if(confirm('Reset ALL orders?')){DB.saveOrders([]);toast('Orders cleared','info');}">🗑️ Clear All Orders</button>
    <button class="btn-sm btn-yellow" onclick="if(confirm('Reset ALL deposits?')){DB.saveDeposits([]);toast('Deposits cleared','info');}">🗑️ Clear All Deposits</button>
  </div>
</div>`;
}
function saveSettings(){
  const s={
    siteName:document.getElementById('ss_name').value,
    currency:document.getElementById('ss_curr').value,
    currSymbol:document.getElementById('ss_sym').value,
    minDeposit:parseFloat(document.getElementById('ss_mind').value)||50,
    maxDeposit:parseFloat(document.getElementById('ss_maxd').value)||100000,
    announcementText:document.getElementById('ss_ann').value,
    upiId:document.getElementById('ss_upi').value,
    bankName:document.getElementById('ss_bname').value,
    bankAcc:document.getElementById('ss_bacc').value,
    bankIFSC:document.getElementById('ss_ifsc').value,
    bankHolder:document.getElementById('ss_holder').value,
  };
  DB.saveSettings(s);toast('Settings saved! ⚙️✅','success');
}

// ============================================================
// BOOT
// ============================================================
initData();
const initHash=window.location.hash.replace('#','')||'home';
Router.render(initHash);
</script>
</body>
</html>
